server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2m;
    client_body_buffer_size 64k;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self';" always;
    # HSTS — only active when TLS terminates upstream (load balancer or cloudflared)
    # Remove or reduce max-age if running plain HTTP locally
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block source maps
    location ~* \.map$ {
        return 404;
    }

    # Block raw source files
    location ~* \.(ts|tsx|jsx|vue|svelte)$ {
        return 404;
    }

    # Prevent search engine indexing
    add_header X-Robots-Tag "noindex, nofollow" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        client_max_body_size 512k;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
