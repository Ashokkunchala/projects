name = "cost-detective-agent"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# ─── Environment Configuration ────────────────────────────────────────────────

[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
ALLOWED_ORIGINS = "*"  # Restrict in production: "https://yourdomain.com"

# ─── AI Configuration ─────────────────────────────────────────────────────────

[ai]
binding = "AI"

# ─── KV Namespaces ────────────────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create CACHE
# Then replace the IDs below with your actual namespace IDs

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_CACHE_KV_ID"
preview_id = "YOUR_CACHE_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_RATE_LIMIT_KV_ID"
preview_id = "YOUR_RATE_LIMIT_KV_PREVIEW_ID"

# ─── D1 Databases ─────────────────────────────────────────────────────────────
# Create with: npx wrangler d1 create cost-detective
# Then replace database_id with your actual database ID

[[d1_databases]]
binding = "DB"
database_name = "cost-detective"
database_id = "YOUR_D1_DATABASE_ID"

# ─── R2 Storage ───────────────────────────────────────────────────────────────
# Create with: npx wrangler r2 bucket create cost-detective-storage

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cost-detective-storage"

# ─── Queues ───────────────────────────────────────────────────────────────────

[[queues.producers]]
binding = "ANALYSIS_QUEUE"
queue = "cost-detective-analysis"

# ─── Environment Variables ────────────────────────────────────────────────────

[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.kv_namespaces]
CACHE = { id = "YOUR_PROD_CACHE_KV_ID", preview_id = "YOUR_PROD_CACHE_KV_PREVIEW_ID" }
RATE_LIMIT = { id = "YOUR_PROD_RATE_LIMIT_KV_ID", preview_id = "YOUR_PROD_RATE_LIMIT_KV_PREVIEW_ID" }

[env.production.d1_databases]
DB = { database_name = "cost-detective-prod", database_id = "YOUR_PROD_D1_ID" }

[env.staging]
vars = { ENVIRONMENT = "staging", LOG_LEVEL = "debug" }

[env.staging.kv_namespaces]
CACHE = { id = "YOUR_STAGING_CACHE_KV_ID", preview_id = "YOUR_STAGING_CACHE_KV_PREVIEW_ID" }
RATE_LIMIT = { id = "YOUR_STAGING_RATE_LIMIT_KV_ID", preview_id = "YOUR_STAGING_RATE_LIMIT_KV_PREVIEW_ID" }

[env.staging.d1_databases]
DB = { database_name = "cost-detective-staging", database_id = "YOUR_STAGING_D1_ID" }
